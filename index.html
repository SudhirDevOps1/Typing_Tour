    <style>
      /* Custom CSS for themes, cursor, and key highlights */
      body {
        font-family: "Inter", sans-serif;
        transition: background-color 0.3s;
      }

      /* Dark Theme (Default) */
      .theme-dark {
        background-color: #1a202c; /* Gray-900 */
        color: #e2e8f0; /* Gray-200 */
      }
      .theme-dark .app-card {
        background-color: #2d3748; /* Gray-700 */
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
      }
      .theme-dark .typing-box {
        background-color: #171923; /* Gray-900 darker */
        color: #cbd5e0; /* Gray-300 */
        border: 1px solid #4a5568;
      }
      .theme-dark .key {
        background-color: #4a5568;
        color: #fff;
        border-bottom: 3px solid #2d3748;
      }
      .theme-dark .highlighted-key {
        background-color: #4299e1 !important;
        border-bottom-color: #2b6cb0 !important;
      }
      .theme-dark .correct-char {
        color: #38a169;
      }
      .theme-dark .incorrect-char {
        background-color: #fca5a533;
        color: #fc8181;
      }

      /* Light Theme */
      .theme-light {
        background-color: #f7fafc; /* Gray-100 */
        color: #2d3748; /* Gray-700 */
      }
      .theme-light .app-card {
        background-color: #ffffff;
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
      }
      .theme-light .typing-box {
        background-color: #edf2f7;
        color: #2d3748;
        border: 1px solid #cbd5e0;
      }
      .theme-light .key {
        background-color: #e2e8f0;
        color: #4a5568;
        border-bottom: 3px solid #cbd5e0;
      }
      .theme-light .highlighted-key {
        background-color: #3182ce !important;
        color: #fff !important;
        border-bottom-color: #2c5282 !important;
      }
      .theme-light .correct-char {
        color: #2f855a;
      }
      .theme-light .incorrect-char {
        background-color: #fca5a555;
        color: #c53030;
      }

      /* Neon Theme */
      .theme-neon {
        background-color: #0d0d10;
        color: #00ff99; /* Neon Green */
      }
      .theme-neon .app-card {
        background-color: #1a1a2e;
        box-shadow: 0 0 20px rgba(0, 255, 153, 0.5);
        border: 1px solid #00ff99;
      }
      .theme-neon .typing-box {
        background-color: #0d0d10;
        color: #00ffff; /* Neon Blue */
        border: 1px solid #00ff99;
        white-space: pre-wrap; /* Preserve formatting for code/JSON */
      }
      .theme-neon .key {
        background-color: #2a0035;
        color: #f0f;
        border-bottom: 3px solid #00ff99;
        box-shadow: 0 0 5px #00ff99;
      }
      .theme-neon .highlighted-key {
        background-color: #00ff99 !important;
        color: #1a1a2e !important;
        border-bottom-color: #00cc77 !important;
      }
      .theme-neon .correct-char {
        color: #00ff99;
      }
      .theme-neon .incorrect-char {
        background-color: #ff00ff33;
        color: #ff00ff;
      }

      /* Always active styles */
      .typing-box {
        min-height: 120px;
        line-height: 1.8;
        letter-spacing: 0.5px;
        font-size: 1.5rem;
        padding: 1rem;
        cursor: text;
        user-select: none;
        overflow-wrap: break-word; /* Prevents overflow of long words */
        white-space: pre-wrap; /* Important for code formatting */
      }

      /* Active cursor */
      .current-char {
        border-bottom: 3px solid #4299e1;
        animation: cursorBlink 1s infinite step-end;
        margin-bottom: -3px; /* Compensate for border */
      }
      @keyframes cursorBlink {
        50% {
          border-bottom-color: transparent;
        }
      }

      /* Finger Guide Colors */
      .f-p {
        background-color: #8b5cf6;
      } /* Purple: Pinky */
      .f-r {
        background-color: #3b82f6;
      } /* Blue: Ring */
      .f-m {
        background-color: #10b981;
      } /* Emerald: Middle */
      .f-i {
        background-color: #f59e0b;
      } /* Amber: Index */
      .f-t {
        background-color: #f97316;
      } /* Orange: Thumb/Space */

      /* Keyboard Key Styling */
      .key {
        padding: 8px 12px;
        border-radius: 6px;
        text-align: center;
        font-weight: 600;
        transition: all 0.05s ease;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        flex-shrink: 0;
        min-width: 30px;
      }

      /* WPM History Chart Styling */
      #wpm-history-chart {
        display: flex;
        align-items: flex-end;
        height: 150px;
        border-left: 2px solid #4a5568;
        border-bottom: 2px solid #4a5568;
        padding-left: 5px;
        gap: 5px;
      }
      .wpm-bar {
        width: 8%;
        background-color: #3182ce;
        transition: height 0.3s ease-out;
        position: relative;
        border-radius: 2px 2px 0 0;
      }
      .wpm-label {
        position: absolute;
        top: -20px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 0.75rem;
        color: #a0aec0;
      }

      /* Modal specific animation */
      .modal-enter {
        opacity: 0;
        transform: translateY(-20px);
      }
      .modal-enter-active {
        opacity: 1;
        transform: translateY(0);
        transition: opacity 0.3s, transform 0.3s;
      }
      .modal-exit {
        opacity: 1;
        transform: translateY(0);
      }
      .modal-exit-active {
        opacity: 0;
        transform: translateY(-20px);
        transition: opacity 0.3s, transform 0.3s;
      }
    </style>

        "Use the pinky finger for Shift, Enter, and Backspace.",
      ];

      // --- LOCAL STORAGE HANDLING ---

      function saveState() {
        try {
          localStorage.setItem("typingApp_settings", JSON.stringify(settings));
          localStorage.setItem("typingApp_stats", JSON.stringify(stats));
        } catch (e) {
          console.error("Could not save to localStorage:", e);
        }
      }

      function loadState() {
        try {
          const savedSettings = localStorage.getItem("typingApp_settings");
          const savedStats = localStorage.getItem("typingApp_stats");

          if (savedSettings) {
            settings = { ...SETTINGS_DEFAULTS, ...JSON.parse(savedSettings) };
          }
          if (savedStats) {
            stats = { ...STATS_DEFAULTS, ...JSON.parse(savedStats) };
          }
        } catch (e) {
          console.error("Could not load from localStorage, using defaults:", e);
        }
        applySettings();
      }

      // --- UI UTILITIES ---

      /** Applies current settings to the UI (Theme, Font Size, etc.) */
      function applySettings() {
        document.body.className = `theme-${settings.theme}`;
        document
          .querySelector("#keyboard-container")
          .classList.toggle("hidden", !settings.highlightOn);
        document.body.style.fontSize = `${settings.fontSize}rem`;
        document.body.classList.toggle("high-contrast", settings.highContrast);

        document.querySelectorAll(".key").forEach((keyEl) => {
          if (!settings.highlightOn) {
            keyEl.classList.remove("highlighted-key");
          }
        });
      }

      /** Shows a custom modal message */
      function showModal(title, body) {
        const modalWrapper = document.getElementById("modal-content-wrapper");

        document.getElementById("modal-title").textContent = title;
        document.getElementById("modal-body").innerHTML = body;
        document.getElementById("app-modal").classList.remove("hidden");

        // Animation
        modalWrapper.classList.remove("modal-enter", "modal-exit-active");
        modalWrapper.classList.add("modal-enter-active");
      }

      /** Hides the custom modal message */
      function closeModal() {
        const modalWrapper = document.getElementById("modal-content-wrapper");

        modalWrapper.classList.remove("modal-enter-active", "modal-enter");
        modalWrapper.classList.add("modal-exit-active");

        setTimeout(() => {
          document.getElementById("app-modal").classList.add("hidden");
        }, 300);
      }

      // --- TYPING ENGINE ---

      /** Renders the target text into spans for typing */
      function renderText(text) {
        const typingBox = document.getElementById("typing-text");
        if (!typingBox) return;

        // Handle newline characters by replacing them with a custom element
        const textWithNewlines = text.replace(/\n/g, "↵");

        typingBox.innerHTML = Array.from(textWithNewlines)
          .map((char, index) => {
            const isCurrent = index === 0 ? "current-char" : "";

            let content = char;
            let extraClass = "";

            if (char === " ") {
              content = "&nbsp;";
            } else if (char === "↵") {
              // Visual indicator for newline
              content = "⏎";
              extraClass = "text-red-400 font-bold";
            }

            return `<span id="char-${index}" class="char ${isCurrent} ${extraClass} transition-colors duration-100">${content}</span>`;
          })
          .join("");
      }

      /** Updates WPM, Errors, and Accuracy metrics */
      function updateMetrics(textLength) {
        const currentTime = Date.now();
        const timeElapsedMinutes = (currentTime - appState.startTime) / 60000;
        const timeElapsedSeconds = Math.floor(
          (currentTime - appState.startTime) / 1000
        );

        if (timeElapsedMinutes > 0) {
          const netWords = appState.correctChars / 5;
          appState.wpm = Math.max(0, Math.round(netWords / timeElapsedMinutes));
        } else {
          appState.wpm = 0;
        }

        appState.accuracy =
          appState.totalCharsTyped > 0
            ? Math.round(
                (appState.correctChars / appState.totalCharsTyped) * 100
              )
            : 100;

        // Update UI stats
        const statsContainer = document.getElementById("typing-stats");
        if (statsContainer) {
          statsContainer.innerHTML = `
                  <div class="p-2 md:p-3 rounded-lg text-center bg-gray-700/50">
                      <p class="text-xs text-gray-400">Time</p>
                      <p class="text-xl font-bold text-yellow-400">${timeElapsedSeconds}s</p>
                  </div>
                  <div class="p-2 md:p-3 rounded-lg text-center bg-gray-700/50">
                      <p class="text-xs text-gray-400">WPM</p>
                      <p class="text-xl font-bold text-blue-400">${appState.wpm}</p>
                  </div>
                  <div class="p-2 md:p-3 rounded-lg text-center bg-gray-700/50">
                      <p class="text-xs text-gray-400">Accuracy</p>
                      <p class="text-xl font-bold text-green-400">${appState.accuracy}%</p>
                  </div>
                  <div class="p-2 md:p-3 rounded-lg text-center bg-gray-700/50">
                      <p class="text-xs text-gray-400">Errors</p>
                      <p class="text-xl font-bold text-red-400">${appState.errors}</p>
                  </div>
              `;
        }
      }

      /** Starts or resets the typing session */
      function startTyping(text, levelId = null) {
        appState.currentText = text;
        appState.currentIndex = 0;
        appState.errors = 0;
        appState.correctChars = 0;
        appState.totalCharsTyped = 0;
        appState.wpm = 0;
        appState.accuracy = 100;
        appState.startTime = 0;
        appState.currentLevel = levelId;
        appState.isGameMode = false;

        clearInterval(appState.timer);
        appState.timer = null;

        renderText(text);
        updateMetrics(text.length);

        document.removeEventListener("keydown", handleKeydown);
        document.addEventListener("keydown", handleKeydown);
        const typingBox = document.getElementById("typing-text");
        if (typingBox) typingBox.focus();

        document.getElementById("finger-hint").textContent = "";
        updateKeyboardHighlight(null);

        // Reset progress bar
        const progressBar = document.getElementById("level-progress");
        if (progressBar) {
          progressBar.style.width = "0%";
        }
      }

      /** Handles keyboard input */
      function handleKeydown(event) {
        if (
          !document.getElementById("typing-text") ||
          appState.currentIndex >= appState.currentText.length
        ) {
          if (appState.isGameMode && window.handleGameKeydown) {
            window.handleGameKeydown(event);
          }
          return;
        }

        const expectedChar = appState.currentText[appState.currentIndex];
        let typedKey = event.key;

        // --- Keyboard Visuals ---
        if (settings.highlightOn) {
          updateKeyboardHighlight(typedKey, expectedChar);
        }

        // --- Control and Modifier Keys ---
        if (typedKey === "Escape") {
          renderView("levels");
          return;
        }
        if (
          typedKey === "Tab" ||
          typedKey === "Alt" ||
          typedKey === "Control"
        ) {
          event.preventDefault();
          return;
        }
        if (typedKey === "Backspace") {
          if (appState.currentIndex > 0) {
            handleBackspace();
          }
          event.preventDefault();
          return;
        }

        // Special handling for Enter/Newline
        if (expectedChar === "\n" || expectedChar === "↵") {
          typedKey = typedKey === "Enter" ? "\n" : typedKey;
        }

        // Only proceed with typable keys
        if (typedKey.length !== 1 && typedKey !== "Enter") {
          return;
        }

        event.preventDefault();

        // --- Timer Start ---
        if (appState.startTime === 0) {
          appState.startTime = Date.now();
          appState.timer = setInterval(() => {
            updateMetrics(appState.currentText.length);
          }, 1000);
        }

        // --- Core Typing Logic ---

        if (settings.soundOn && synth) {
          synth.triggerAttackRelease("C4", "8n");
        }

        const charElements = document.getElementById("typing-text").children;
        const currentCharEl = charElements[appState.currentIndex];

        // Check for correctness (handling newline character specially)
        let isCorrect = false;
        if (expectedChar === "\n" || expectedChar === "↵") {
          isCorrect = typedKey === "\n" || typedKey === "Enter";
        } else {
          isCorrect = typedKey === expectedChar;
        }

        // Update character status
        currentCharEl.classList.remove("current-char");
        appState.totalCharsTyped++;

        if (isCorrect) {
          currentCharEl.classList.add("correct-char");
          appState.correctChars++;
        } else {
          currentCharEl.classList.add("incorrect-char");
          appState.errors++;
        }

        // Move to the next index
        appState.currentIndex++;

        // Update WPM, progress bar, and display
        updateMetrics(appState.currentText.length);

        const progressPercent =
          (appState.currentIndex / appState.currentText.length) * 100;
        const progressBar = document.getElementById("level-progress");
        if (progressBar) {
          progressBar.style.width = `${progressPercent}%`;
        }

        // --- Check for Completion ---
        if (appState.currentIndex >= appState.currentText.length) {
          handleCompletion();
        } else {
          // Set the next character as current
          charElements[appState.currentIndex].classList.add("current-char");
          // Update hint for the next character
          updateKeyboardHighlight(
            null,
            appState.currentText[appState.currentIndex]
          );
        }
      }

      /** Handles backspace logic */
      function handleBackspace() {
        const charElements = document.getElementById("typing-text").children;

        // Move cursor back
        charElements[appState.currentIndex].classList.remove("current-char");
        appState.currentIndex--;

        const prevCharEl = charElements[appState.currentIndex];

        // Reset status of the previous character
        prevCharEl.classList.remove("correct-char", "incorrect-char");
        prevCharEl.classList.add("current-char");

        // Decrement counts (only if character was already typed)
        if (appState.totalCharsTyped > 0) {
          appState.totalCharsTyped--;
        }
        // This simple logic might over-decrement correct/error count but is a reasonable approximation
        // for basic backspace handling without complex state tracking.

        updateMetrics(appState.currentText.length);
        updateKeyboardHighlight(
          null,
          appState.currentText[appState.currentIndex]
        );

        // Update progress bar
        const progressPercent =
          (appState.currentIndex / appState.currentText.length) * 100;
        const progressBar = document.getElementById("level-progress");
        if (progressBar) {
          progressBar.style.width = `${progressPercent}%`;
        }
      }

      /** Handles level completion and progress update */
      function handleCompletion() {
        document.removeEventListener("keydown", handleKeydown);
        clearInterval(appState.timer);

        const timeTaken = Math.floor((Date.now() - appState.startTime) / 1000);

        // Save WPM History (last 10 scores)
        let recentWPMs = JSON.parse(
          localStorage.getItem("typingApp_recent_wpms") || "[]"
        );
        recentWPMs.push(appState.wpm);
        if (recentWPMs.length > 10) {
          recentWPMs = recentWPMs.slice(-10);
        }
        localStorage.setItem(
          "typingApp_recent_wpms",
          JSON.stringify(recentWPMs)
        );

        // --- Update Stats & Unlock Logic ---
        const levelId = appState.currentLevel;
        if (levelId) {
          const currentLevelStats = stats.levelProgress[levelId] || {
            bestWPM: 0,
            accuracy: 0,
            attempts: 0,
            unlocked: levelId === 1,
          };

          currentLevelStats.attempts++;
          currentLevelStats.totalPracticeMinutes =
            (currentLevelStats.totalPracticeMinutes || 0) + timeTaken / 60;

          if (appState.wpm > currentLevelStats.bestWPM) {
            currentLevelStats.bestWPM = appState.wpm;
          }

          if (appState.accuracy > currentLevelStats.accuracy) {
            currentLevelStats.accuracy = appState.accuracy;
          }

          stats.levelProgress[levelId] = currentLevelStats;

          // --- Unlock Next Level Logic (Adjusted for Advanced Levels) ---
          const nextLevelId = levelId + 1;
          const isLevel50 = levelId === 50;

          // Advanced Unlock condition: Higher WPM target for advanced levels
          const unlockWPMTarget = levelId >= 50 ? 40 : 30;
          const unlockConditionMet =
            appState.accuracy >= 80 || appState.wpm >= unlockWPMTarget;

          if (unlockConditionMet) {
            // Unlock next sequential level (up to 59)
            if (nextLevelId <= 59 && !stats.levelProgress[nextLevelId]) {
              stats.levelProgress[nextLevelId] = {
                bestWPM: 0,
                accuracy: 0,
                attempts: 0,
                unlocked: true,
              };
              showModal(
                `Level ${levelId} Complete!`,
                `Congratulations! You unlocked Level ${nextLevelId}. WPM: ${appState.wpm}, Accuracy: ${appState.accuracy}%.`
              );
            }

            // Unlock Level 60 (Expert Random Mode) if Level 50 is mastered
            if (isLevel50 && !stats.levelProgress[60]) {
              stats.levelProgress[60] = {
                bestWPM: 0,
                accuracy: 0,
                attempts: 0,
                unlocked: true,
              };
              showModal(
                `Grand Mastery Achieved!`,
                `You mastered Level 50 and unlocked the **Expert Random Mode (Level 60)**!`
              );
            }
          }
        }

        saveState();

        // Show results screen
        renderView("results", { ...appState, timeTaken });
      }

      /** Manages key highlighting and finger hint */
      function updateKeyboardHighlight(typedKey, expectedChar) {
        // Remove previous highlight
        document.querySelectorAll(".key.highlighted-key").forEach((el) => {
          el.classList.remove("highlighted-key");
        });

        const hintEl = document.getElementById("finger-hint");
        hintEl.textContent = "";

        if (!settings.highlightOn || !expectedChar) {
          return;
        }

        // Normalize expected char (handle newline)
        const targetChar =
          expectedChar === "\n" || expectedChar === "↵"
            ? "Enter"
            : expectedChar.toLowerCase();

        const charInfo = KEYBOARD_MAP[targetChar];

        if (charInfo) {
          const keyEl = document.getElementById(charInfo.id);
          if (keyEl) {
            keyEl.classList.add("highlighted-key");
            hintEl.textContent = `Use: ${FINGER_NAMES[charInfo.finger]}`;
          }
        }
      }

      // --- VIEW RENDERING ---

      /** Main function to switch application views */
      function renderView(viewName, data = {}) {
        appState.view = viewName;
        const contentArea = document.getElementById("content-area");
        contentArea.innerHTML = "";

        // Stop game loop/timer if switching away from typing/game
        if (appState.isGameMode && window.stopGameLoop) {
          window.stopGameLoop();
        }
        appState.isGameMode = false;
        document.removeEventListener("keydown", handleKeydown);

        switch (viewName) {
          case "home":
            showHome(contentArea);
            break;
          case "levels":
            showLevelsScreen(contentArea);
            break;
          case "typing":
            showTypingScreen(contentArea, data.text, data.levelId);
            break;
          case "speedTest":
            showSpeedTestScreen(contentArea);
            break;
          case "games":
            showGamesScreen(contentArea);
            break;
          case "gamePlay":
            showGamePlayScreen(contentArea, data.game);
            break;
          case "settings":
            showSettingsScreen(contentArea);
            break;
          case "hints":
            showHintsScreen(contentArea);
            break;
          case "results":
            showResultsScreen(contentArea, data);
            break;
          case "analytics":
            showAnalyticsScreen(contentArea);
            break;
          default:
            showHome(contentArea);
        }
        window.scrollTo(0, 0);
      }
      window.renderView = renderView;

      function showHome(container) {
        container.className =

        container.innerHTML = `

                  <p class="text-gray-400 mb-10 text-lg max-w-2xl mx-auto">

                      ${[
                        {

                          view: "speedTest",

                      ]

      /** Levels Selection Screen */
      function showLevelsScreen(container) {
        container.className = "w-full flex-grow flex flex-col";
        container.innerHTML = `

                  ${LEVELS.map((level) => {
                    const levelStats = stats.levelProgress[level.id];
                    const unlocked =
                      settings.mode === "free" ||
                      level.id === 1 ||
                      (levelStats && levelStats.unlocked);
                    const bestWPM = levelStats ? levelStats.bestWPM : 0;
                    const accuracy = levelStats ? levelStats.accuracy : 0;

                    return `
                          <button onclick="${
                            unlocked
                              ? `renderView('typing', {text: \`${level.content
                                  .replace(/`/g, "\\`")

                              : `showModal('Locked Level', 'Please meet the target (80% accuracy OR 30/40 WPM) on the previous level to unlock.')`

                              ${

                                  : "bg-red-800/30 cursor-not-allowed opacity-70"

                                unlocked ? "text-green-300" : "text-red-300"
                              }">Lvl ${level.id}: ${level.title} - ${

                              <p class="text-sm text-gray-400 mt-1 truncate">Target: ${

                              <p class="text-xs text-yellow-400 mt-2">Best WPM: ${bestWPM} | Acc: ${accuracy}%</p>
                          </button>

          `;

      /** Analytics/Progress Dashboard (Updated with WPM History Chart) */

          ) / Math.max(1, completedLevels);

        const recentWPMs = JSON.parse(
          localStorage.getItem("typingApp_recent_wpms") || "[]"
        );

          .map((wpm) => {

                    heightPercent

      // --- SETTINGS CONTROLS (Remains the same) ---
      function updateSetting(key, value) {

      function exportProgress() {
        const dataStr = JSON.stringify(
          {
            settings,
            stats,
            recentWPMs: JSON.parse(
              localStorage.getItem("typingApp_recent_wpms") || "[]"
            ),
          },
          null,
          2
        );
        const blob = new Blob([dataStr], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "SKSingh_Typing_Progress.json";
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        showModal(
          "Progress Exported",
          "Your data has been downloaded as SKSingh_Typing_Progress.json"
        );
      }

      // --- TYPING WALK GAME LOGIC (Remains the same) ---

      let game = {
        targetText: "the quick brown fox jumps over the lazy dog",
        nextCharIndex: 0,
        currentWord: "",
        score: 0,
        health: 100,
        gameLoopId: null,
        playerX: 0,
      };

      function initTypingWalkGame() {
        game.targetText = "the quick brown fox jumps over the lazy dog";
        game.nextCharIndex = 0;
        game.currentWord = game.targetText.split(" ")[0];
        game.score = 0;
        game.health = 100;
        game.playerX = 0;
        appState.isGameMode = true;

        const gameArea = document.getElementById("game-area");
        gameArea.innerHTML = `
              <div id="game-player" class="absolute bottom-4 left-0 w-8 h-8 rounded-full bg-blue-500 flex items-center justify-center text-white font-bold transition-transform duration-100" style="transform: translateX(0px);">🚶</div>
              <div id="game-info" class="absolute top-4 left-4 right-4 flex justify-between text-white text-lg font-semibold">
                  <span>Score: <span id="game-score">0</span></span>
                  <span>Health: <span id="game-health" class="text-green-400">100</span></span>
              </div>
              <div id="game-word" class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 text-5xl font-extrabold text-yellow-400 shadow-xl p-4 rounded-lg bg-gray-700/80">${game.currentWord}</div>
              <div id="game-input-tracker" class="absolute bottom-20 left-1/2 transform -translate-x-1/2 text-2xl text-green-400"></div>
              <div id="game-message" class="absolute inset-0 flex items-center justify-center text-5xl font-extrabold text-red-500 bg-black/70 hidden">GAME OVER</div>
          `;

        document.addEventListener("keydown", handleGameKeydown);
        document.getElementById("game-controls").innerHTML = `
              <button onclick="startGameLoop()" class="py-2 px-6 bg-green-600 text-white font-semibold rounded-lg hover:bg-green-700 transition">Start Walk</button>
              <button onclick="renderView('games')" class="py-2 px-6 bg-red-600 text-white font-semibold rounded-lg hover:bg-red-700 transition">Exit Game</button>
          `;
      }

      window.handleGameKeydown = function (event) {
        if (!appState.isGameMode || !game.gameLoopId) return;

        const typedKey = event.key;
        const expectedChar = game.currentWord[game.nextCharIndex];

        if (typedKey.length !== 1 && typedKey !== " ") return;
        event.preventDefault();

        if (typedKey === expectedChar) {
          game.nextCharIndex++;
          game.score += 5;

          const gameAreaWidth =
            document.getElementById("game-area").clientWidth;
          game.playerX = Math.min(gameAreaWidth - 32, game.playerX + 10);
          document.getElementById(
            "game-player"
          ).style.transform = `translateX(${game.playerX}px)`;

          const trackerEl = document.getElementById("game-input-tracker");
          trackerEl.textContent = game.currentWord.substring(
            0,
            game.nextCharIndex
          );

          if (game.nextCharIndex >= game.currentWord.length) {
            moveToNextWord();
          }
        } else if (typedKey !== "Shift" && typedKey !== "Backspace") {
          game.health = Math.max(0, game.health - 5);
          document.getElementById("game-health").textContent = game.health;

          if (game.health <= 0) {
            stopGameLoop(true);
          }
        }
        document.getElementById("game-score").textContent = game.score;
      };

      function moveToNextWord() {
        const words = game.targetText.split(" ");
        const currentWordIndex = words.indexOf(game.currentWord);

        if (currentWordIndex < words.length - 1) {
          game.currentWord = words[currentWordIndex + 1];
          game.nextCharIndex = 0;
          document.getElementById("game-word").textContent = game.currentWord;
          document.getElementById("game-input-tracker").textContent = "";
        } else {
          stopGameLoop(false);
        }
      }

      function startGameLoop() {
        if (game.gameLoopId) return;

        let lastTime = 0;
        const loop = (timestamp) => {
          if (game.health <= 0) {
            stopGameLoop(true);
            return;
          }

          if (timestamp - lastTime > 1000) {
            game.health = Math.max(0, game.health - 1);
            document.getElementById("game-health").textContent = game.health;
            lastTime = timestamp;
          }

          game.gameLoopId = requestAnimationFrame(loop);
        };
        game.gameLoopId = requestAnimationFrame(loop);
        document.getElementById("game-message").classList.add("hidden");
      }

      window.stopGameLoop = function (isGameOver = true) {
        cancelAnimationFrame(game.gameLoopId);
        game.gameLoopId = null;

        document.getElementById("game-controls").innerHTML = `
              <button onclick="renderView('gamePlay', {game: 'typingWalk'})" class="py-2 px-6 bg-green-600 text-white font-semibold rounded-lg hover:bg-green-700 transition">Play Again</button>
              <button onclick="renderView('games')" class="py-2 px-6 bg-red-600 text-white font-semibold rounded-lg hover:bg-red-700 transition">Exit Game</button>
          `;

        if (isGameOver) {
          document.getElementById("game-message").textContent = "GAME OVER";
          document.getElementById("game-message").classList.remove("hidden");
        } else {
          document.getElementById("game-message").textContent =
            "SUCCESS! SCORE: " + game.score;
          document.getElementById("game-message").classList.remove("hidden");
        }

        const currentScore = game.score;
        let highScores = JSON.parse(
          localStorage.getItem("typingApp_walk_scores") || "[]"
        );
        highScores.push(currentScore);
        highScores.sort((a, b) => b - a);
        localStorage.setItem(
          "typingApp_walk_scores",
          JSON.stringify(highScores.slice(0, 5))
        );
      };

      // --- INITIALIZATION ---

      window.onload = function () {
        loadState();
        setupSynth();
        renderView("home");
      };
    </script>
