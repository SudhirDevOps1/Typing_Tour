<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SKSingh Typing App - Ultimate Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.min.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&family=JetBrains+Mono:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
    <style>
      body {
        font-family: "Inter", sans-serif;
        transition:
          background-color 0.3s,
          color 0.3s;
      }

      .mono {
        font-family: "JetBrains Mono", monospace;
      }

      /* ── THEMES ── */
      .theme-dark {
        background: #0f172a;
        color: #e2e8f0;
      }

      .theme-dark .app-card {
        background: linear-gradient(135deg, #1e293b 0%, #1a2332 100%);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        border: 1px solid #334155;
      }

      .theme-dark .typing-box {
        background: #0f172a;
        color: #cbd5e0;
        border: 1px solid #334155;
      }

      .theme-dark .key {
        background: linear-gradient(180deg, #3e4c5e 0%, #2d3a4a 100%);
        color: #e2e8f0;
        border: 1px solid #4a5a6e;
        border-bottom: 3px solid #1e2a3a;
        text-shadow: 0 1px 1px rgba(0, 0, 0, 0.3);
      }

      .theme-dark .key:hover {
        background: linear-gradient(180deg, #4a5a6e 0%, #3a4858 100%);
      }

      .theme-dark .highlighted-key {
        background: linear-gradient(
          180deg,
          #3b82f6 0%,
          #2563eb 100%
        ) !important;
        border-color: #1d4ed8 !important;
        border-bottom-color: #1e40af !important;
        box-shadow:
          0 0 15px rgba(59, 130, 246, 0.5),
          inset 0 1px 0 rgba(255, 255, 255, 0.15) !important;
        color: #fff !important;
      }

      .theme-dark .correct-char {
        color: #22c55e;
      }

      .theme-dark .incorrect-char {
        background: rgba(239, 68, 68, 0.15);
        color: #ef4444;
        text-decoration: underline wavy #ef4444;
      }

      .theme-dark .keyboard-wrap {
        background: linear-gradient(180deg, #1a2538 0%, #111827 100%);
        border: 1px solid #2a3a50;
        box-shadow:
          0 8px 32px rgba(0, 0, 0, 0.5),
          inset 0 1px 0 rgba(255, 255, 255, 0.03);
      }

      .theme-dark .key-home {
        box-shadow: inset 0 -2px 0 0 #60a5fa;
      }

      .theme-light {
        background: #f8fafc;
        color: #1e293b;
      }

      .theme-light .app-card {
        background: #fff;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        border: 1px solid #e2e8f0;
      }

      .theme-light .typing-box {
        background: #f1f5f9;
        color: #1e293b;
        border: 1px solid #cbd5e0;
      }

      .theme-light .key {
        background: linear-gradient(180deg, #f8fafc 0%, #e8ecf0 100%);
        color: #374151;
        border: 1px solid #c8cdd5;
        border-bottom: 3px solid #b0b8c4;
      }

      .theme-light .key:hover {
        background: linear-gradient(180deg, #fff 0%, #f0f3f6 100%);
      }

      .theme-light .highlighted-key {
        background: linear-gradient(
          180deg,
          #3b82f6 0%,
          #2563eb 100%
        ) !important;
        color: #fff !important;
        border-color: #1d4ed8 !important;
        border-bottom-color: #1e40af !important;
        box-shadow: 0 0 12px rgba(37, 99, 235, 0.4) !important;
      }

      .theme-light .correct-char {
        color: #16a34a;
      }

      .theme-light .incorrect-char {
        background: rgba(220, 38, 38, 0.12);
        color: #dc2626;
        text-decoration: underline wavy #dc2626;
      }

      .theme-light .keyboard-wrap {
        background: linear-gradient(180deg, #e8ecf2 0%, #d8dce5 100%);
        border: 1px solid #c0c8d4;
        box-shadow:
          0 4px 16px rgba(0, 0, 0, 0.1),
          inset 0 1px 0 rgba(255, 255, 255, 0.8);
      }

      .theme-light .key-home {
        box-shadow: inset 0 -2px 0 0 #2563eb;
      }

      .theme-neon {
        background: #0a0a0f;
        color: #00ff88;
      }

      .theme-neon .app-card {
        background: linear-gradient(135deg, #0f0f1a 0%, #1a0a2e 100%);
        box-shadow: 0 0 30px rgba(0, 255, 136, 0.15);
        border: 1px solid #00ff8844;
      }

      .theme-neon .typing-box {
        background: #06060a;
        color: #00ffff;
        border: 1px solid #00ff8844;
        text-shadow: 0 0 8px rgba(0, 255, 255, 0.3);
      }

      .theme-neon .key {
        background: linear-gradient(180deg, #1a0a30 0%, #120820 100%);
        color: #e0b0ff;
        border: 1px solid #3a1a5e;
        border-bottom: 3px solid #0a0415;
        text-shadow: 0 0 5px rgba(224, 176, 255, 0.3);
      }

      .theme-neon .key:hover {
        background: linear-gradient(180deg, #2a1040 0%, #1a0a30 100%);
        box-shadow: 0 0 8px rgba(0, 255, 136, 0.2);
      }

      .theme-neon .highlighted-key {
        background: linear-gradient(
          180deg,
          #00ff88 0%,
          #00cc66 100%
        ) !important;
        color: #0a0a0f !important;
        border-color: #00aa55 !important;
        border-bottom-color: #008844 !important;
        box-shadow:
          0 0 25px #00ff88,
          inset 0 1px 0 rgba(255, 255, 255, 0.2) !important;
        text-shadow: none !important;
      }

      .theme-neon .correct-char {
        color: #00ff88;
        text-shadow: 0 0 8px #00ff88;
      }

      .theme-neon .incorrect-char {
        background: rgba(255, 0, 255, 0.15);
        color: #ff00ff;
        text-shadow: 0 0 8px #ff00ff;
      }

      .theme-neon .keyboard-wrap {
        background: linear-gradient(180deg, #0e0818 0%, #08040f 100%);
        border: 1px solid #2a1050;
        box-shadow:
          0 0 30px rgba(138, 43, 226, 0.15),
          inset 0 1px 0 rgba(255, 255, 255, 0.02);
      }

      .theme-neon .key-home {
        box-shadow: inset 0 -2px 0 0 #00ff88;
      }

      .theme-sunset {
        background: #1a0a00;
        color: #fbbf24;
      }

      .theme-sunset .app-card {
        background: linear-gradient(135deg, #2d1810 0%, #1a1005 100%);
        box-shadow: 0 8px 32px rgba(251, 146, 60, 0.15);
        border: 1px solid #92400e44;
      }

      .theme-sunset .typing-box {
        background: #0f0700;
        color: #fed7aa;
        border: 1px solid #92400e44;
      }

      .theme-sunset .key {
        background: linear-gradient(180deg, #5a2d10 0%, #3d1d08 100%);
        color: #fbbf24;
        border: 1px solid #7c4418;
        border-bottom: 3px solid #2a1505;
        text-shadow: 0 1px 1px rgba(0, 0, 0, 0.4);
      }

      .theme-sunset .key:hover {
        background: linear-gradient(180deg, #6a3a18 0%, #4d2a10 100%);
      }

      .theme-sunset .highlighted-key {
        background: linear-gradient(
          180deg,
          #f97316 0%,
          #ea580c 100%
        ) !important;
        color: #fff !important;
        border-color: #c2410c !important;
        border-bottom-color: #9a3412 !important;
        box-shadow: 0 0 15px rgba(249, 115, 22, 0.5) !important;
      }

      .theme-sunset .correct-char {
        color: #34d399;
      }

      .theme-sunset .incorrect-char {
        background: rgba(239, 68, 68, 0.2);
        color: #fca5a5;
      }

      .theme-sunset .keyboard-wrap {
        background: linear-gradient(180deg, #2a1508 0%, #1a0c04 100%);
        border: 1px solid #5c3010;
        box-shadow:
          0 6px 24px rgba(0, 0, 0, 0.4),
          inset 0 1px 0 rgba(255, 255, 255, 0.03);
      }

      .theme-sunset .key-home {
        box-shadow: inset 0 -2px 0 0 #f97316;
      }

      .theme-ocean {
        background: #001220;
        color: #7dd3fc;
      }

      .theme-ocean .app-card {
        background: linear-gradient(135deg, #002040 0%, #001830 100%);
        box-shadow: 0 8px 32px rgba(14, 165, 233, 0.15);
        border: 1px solid #0369a144;
      }

      .theme-ocean .typing-box {
        background: #000d1a;
        color: #bae6fd;
        border: 1px solid #0369a144;
      }

      .theme-ocean .key {
        background: linear-gradient(180deg, #0e4a6e 0%, #083556 100%);
        color: #bae6fd;
        border: 1px solid #1670a0;
        border-bottom: 3px solid #052540;
        text-shadow: 0 1px 1px rgba(0, 0, 0, 0.3);
      }

      .theme-ocean .key:hover {
        background: linear-gradient(180deg, #155a80 0%, #0c4568 100%);
      }

      .theme-ocean .highlighted-key {
        background: linear-gradient(
          180deg,
          #0ea5e9 0%,
          #0284c7 100%
        ) !important;
        color: #fff !important;
        border-color: #0369a1 !important;
        border-bottom-color: #075985 !important;
        box-shadow: 0 0 15px rgba(14, 165, 233, 0.5) !important;
      }

      .theme-ocean .correct-char {
        color: #4ade80;
      }

      .theme-ocean .incorrect-char {
        background: rgba(244, 63, 94, 0.2);
        color: #fb7185;
      }

      .theme-ocean .keyboard-wrap {
        background: linear-gradient(180deg, #051e35 0%, #031525 100%);
        border: 1px solid #0c4060;
        box-shadow:
          0 6px 24px rgba(0, 0, 0, 0.4),
          inset 0 1px 0 rgba(255, 255, 255, 0.03);
      }

      .theme-ocean .key-home {
        box-shadow: inset 0 -2px 0 0 #0ea5e9;
      }

      /* ── TYPING BOX ── */
      .typing-box {
        min-height: 140px;
        line-height: 2;
        letter-spacing: 0.5px;
        font-size: 1.4rem;
        padding: 1.25rem;
        cursor: text;
        user-select: none;
        overflow-wrap: break-word;
        white-space: pre-wrap;
        border-radius: 12px;
        position: relative;
      }

      .current-char {
        border-bottom: 3px solid #3b82f6;
        animation: cursorBlink 1s infinite step-end;
        margin-bottom: -3px;
      }

      @keyframes cursorBlink {
        50% {
          border-bottom-color: transparent;
        }
      }

      /* ══════════════════════════════════════════════════════ */
      /*               REALISTIC KEYBOARD STYLES               */
      /* ══════════════════════════════════════════════════════ */

      .keyboard-wrap {
        border-radius: 16px;
        padding: 14px 16px 18px;
        position: relative;
      }

      .keyboard-wrap::before {
        content: "";
        position: absolute;
        top: 6px;
        left: 50%;
        transform: translateX(-50%);
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: #4a5568;
        opacity: 0.5;
      }

      .kb-row {
        display: flex;
        justify-content: center;
        gap: 4px;
        margin-bottom: 4px;
      }

      .kb-row:last-child {
        margin-bottom: 0;
      }

      .key {
        height: 42px;
        min-width: 42px;
        border-radius: 7px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-weight: 600;
        font-size: 11px;
        transition: all 0.08s ease;
        cursor: pointer;
        position: relative;
        flex-shrink: 0;
        user-select: none;
        line-height: 1;
        padding: 0 4px;
      }

      .key.pressed {
        transform: translateY(2px);
        border-bottom-width: 1px !important;
        filter: brightness(1.15);
      }

      /* Finger color indicators (left side dot) */
      .key .finger-dot {
        position: absolute;
        top: 3px;
        right: 3px;
        width: 4px;
        height: 4px;
        border-radius: 50%;
        opacity: 0.6;
      }

      .fd-p {
        background: #a78bfa;
      }

      .fd-r {
        background: #60a5fa;
      }

      .fd-m {
        background: #34d399;
      }

      .fd-i {
        background: #fbbf24;
      }

      .fd-t {
        background: #fb923c;
      }

      /* Key sizes */
      .key-backspace {
        min-width: 80px;
      }

      .key-tab {
        min-width: 64px;
      }

      .key-bslash {
        min-width: 64px;
      }

      .key-caps {
        min-width: 74px;
      }

      .key-enter {
        min-width: 88px;
      }

      .key-lshift {
        min-width: 96px;
      }

      .key-rshift {
        min-width: 96px;
      }

      .key-ctrl {
        min-width: 56px;
      }

      .key-alt {
        min-width: 50px;
      }

      .key-space {
        min-width: 280px;
        flex-grow: 0;
      }

      .key-fn {
        min-width: 42px;
      }

      /* Home row bump indicator */
      .key-home::after {
        content: "";
        position: absolute;
        bottom: 6px;
        left: 50%;
        transform: translateX(-50%);
        width: 10px;
        height: 2px;
        border-radius: 1px;
        background: currentColor;
        opacity: 0.35;
      }

      /* Number row keys (slightly shorter) */
      .key-num {
        height: 38px;
        font-size: 10px;
      }

      @media (max-width: 768px) {
        .key {
          height: 36px;
          min-width: 30px;
          font-size: 9px;
          border-radius: 5px;
          gap: 3px;
          padding: 0 2px;
        }

        .key-backspace {
          min-width: 50px;
        }

        .key-tab {
          min-width: 44px;
        }

        .key-bslash {
          min-width: 44px;
        }

        .key-caps {
          min-width: 52px;
        }

        .key-enter {
          min-width: 60px;
        }

        .key-lshift {
          min-width: 62px;
        }

        .key-rshift {
          min-width: 62px;
        }

        .key-ctrl {
          min-width: 38px;
        }

        .key-alt {
          min-width: 34px;
        }

        .key-space {
          min-width: 160px;
        }

        .key-num {
          height: 32px;
          font-size: 8px;
        }

        .kb-row {
          gap: 2px;
          margin-bottom: 2px;
        }

        .keyboard-wrap {
          padding: 8px 6px 12px;
          border-radius: 10px;
        }
      }

      /* ── WPM CHART ── */
      #wpm-history-chart {
        display: flex;
        align-items: flex-end;
        height: 160px;
        border-left: 2px solid #475569;
        border-bottom: 2px solid #475569;
        padding: 0 5px;
        gap: 4px;
      }

      .wpm-bar {
        flex: 1;
        background: linear-gradient(to top, #3b82f6, #8b5cf6);
        transition: height 0.4s ease-out;
        border-radius: 3px 3px 0 0;
        position: relative;
        min-width: 12px;
        max-width: 40px;
      }

      .wpm-label {
        position: absolute;
        top: -22px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 0.65rem;
        white-space: nowrap;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 4px 12px;
        border-radius: 20px;
        font-size: 0.75rem;
        font-weight: 600;
      }

      .badge-gold {
        background: linear-gradient(135deg, #fbbf24, #f59e0b);
        color: #78350f;
      }

      .badge-locked {
        background: #334155;
        color: #64748b;
      }

      .progress-ring-circle {
        transition: stroke-dashoffset 0.5s ease;
      }

      .level-card {
        transition: all 0.2s ease;
        position: relative;
        overflow: hidden;
      }

      .level-card:hover {
        transform: translateY(-2px);
      }

      .level-card::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 3px;
        border-radius: 12px 12px 0 0;
      }

      .level-card.unlocked::before {
        background: linear-gradient(90deg, #22c55e, #3b82f6);
      }

      .level-card.locked::before {
        background: #475569;
      }

      .level-card.completed::before {
        background: linear-gradient(90deg, #fbbf24, #f97316);
      }

      .modal-content {
        animation: modalIn 0.3s ease;
      }

      @keyframes modalIn {
        from {
          opacity: 0;
          transform: scale(0.95) translateY(-10px);
        }

        to {
          opacity: 1;
          transform: scale(1) translateY(0);
        }
      }

      ::-webkit-scrollbar {
        width: 6px;
      }

      ::-webkit-scrollbar-track {
        background: transparent;
      }

      ::-webkit-scrollbar-thumb {
        background: #475569;
        border-radius: 3px;
      }

      .flame {
        animation: flicker 1.5s infinite alternate;
      }

      @keyframes flicker {
        0% {
          transform: scale(1);
        }

        50% {
          transform: scale(1.15);
        }

        100% {
          transform: scale(1);
        }
      }

      .cat-tab {
        padding: 8px 16px;
        border-radius: 20px;
        font-weight: 600;
        font-size: 0.8rem;
        transition: all 0.2s;
        cursor: pointer;
        border: 1px solid transparent;
      }

      .cat-tab.active {
        border-color: currentColor;
      }

      .game-canvas {
        background: linear-gradient(180deg, #0f172a 0%, #1e293b 100%);
        border-radius: 12px;
        position: relative;
        overflow: hidden;
      }

      .confetti-piece {
        position: fixed;
        width: 10px;
        height: 10px;
        animation: confettiFall 3s ease-out forwards;
        pointer-events: none;
        z-index: 100;
      }

      @keyframes confettiFall {
        0% {
          transform: translateY(-100vh) rotate(0deg);
          opacity: 1;
        }

        100% {
          transform: translateY(100vh) rotate(720deg);
          opacity: 0;
        }
      }
    </style>
  </head>

  <body class="theme-dark">
    <div
      id="app-container"
      class="min-h-screen flex flex-col items-center p-3 md:p-6"
    >
      <!-- Header -->
      <header class="w-full max-w-6xl mb-4 flex justify-between items-center">
        <button
          onclick="renderView('home')"
          class="flex items-center gap-3 group"
        >
          <div
            class="w-10 h-10 bg-gradient-to-br from-blue-500 to-purple-600 rounded-xl flex items-center justify-center shadow-lg group-hover:shadow-blue-500/30 transition"
          >
            <i class="fas fa-keyboard text-white"></i>
          </div>
          <div>
            <h1
              class="text-xl font-extrabold bg-gradient-to-r from-blue-400 to-purple-400 bg-clip-text text-transparent leading-tight"
            >
              SKSingh Typing
            </h1>
            <p class="text-[.6rem] text-gray-500 -mt-0.5">
              Ultimate Edition • 100 Levels
            </p>
          </div>
        </button>
        <div class="flex items-center gap-3">
          <div
            id="header-streak"
            class="hidden items-center gap-1 px-3 py-1 rounded-full bg-orange-500/10 border border-orange-500/30"
          >
            <span class="flame text-lg">🔥</span>
            <span id="streak-count" class="text-sm font-bold text-orange-400"
              >0</span
            >
          </div>
          <button
            onclick="renderView('settings')"
            class="p-2 text-gray-400 hover:text-blue-400 transition"
            title="Settings"
          >
            <i class="fas fa-cog"></i>
          </button>
          <button
            onclick="renderView('home')"
            class="p-2 text-gray-400 hover:text-blue-400 transition"
            title="Home"
          >
            <i class="fas fa-home"></i>
          </button>
        </div>
      </header>

      <!-- Main Content -->
      <main
        id="content-area"
        class="w-full max-w-6xl flex-grow flex flex-col"
      ></main>

      <!-- ══════════════════════════════════════════════════════ -->
      <!--              REALISTIC VIRTUAL KEYBOARD               -->
      <!-- ══════════════════════════════════════════════════════ -->
      <div id="keyboard-section" class="w-full max-w-4xl mt-5 mx-auto">
        <div class="flex justify-between items-center mb-2 px-2">
          <h3 class="text-xs font-semibold opacity-40 tracking-wider uppercase">
            Virtual Keyboard
          </h3>
          <span
            id="finger-hint"
            class="text-xs font-medium text-yellow-400"
          ></span>
        </div>
        <div class="keyboard-wrap" id="keyboard-container">
          <!-- Row 0: Number Row -->
          <div class="kb-row">
            <div id="key-backquote" class="key key-num">
              <span class="finger-dot fd-p"></span>~<br />`
            </div>
            <div id="key-1" class="key key-num">
              <span class="finger-dot fd-p"></span>!<br />1
            </div>
            <div id="key-2" class="key key-num">
              <span class="finger-dot fd-r"></span>@<br />2
            </div>
            <div id="key-3" class="key key-num">
              <span class="finger-dot fd-m"></span>#<br />3
            </div>
            <div id="key-4" class="key key-num">
              <span class="finger-dot fd-i"></span>$<br />4
            </div>
            <div id="key-5" class="key key-num">
              <span class="finger-dot fd-i"></span>%<br />5
            </div>
            <div id="key-6" class="key key-num">
              <span class="finger-dot fd-i"></span>^<br />6
            </div>
            <div id="key-7" class="key key-num">
              <span class="finger-dot fd-i"></span>&amp;<br />7
            </div>
            <div id="key-8" class="key key-num">
              <span class="finger-dot fd-m"></span>*<br />8
            </div>
            <div id="key-9" class="key key-num">
              <span class="finger-dot fd-r"></span>(<br />9
            </div>

      function saveState() {
        try {
          localStorage.setItem("ta_s", JSON.stringify(settings));
          localStorage.setItem("ta_st", JSON.stringify(stats));
        } catch (e) {}
      }
      function loadState() {
        try {
          const s = localStorage.getItem("ta_s"),
            t = localStorage.getItem("ta_st");
          if (s) settings = { ...SETTINGS_DEFAULTS, ...JSON.parse(s) };
          if (t) stats = { ...STATS_DEFAULTS, ...JSON.parse(t) };
        } catch (e) {}
        applySettings();
        updateStreak();
      }
      function updateStreak() {
        const today = new Date().toDateString();
        if (stats.lastPracticeDate) {
          const d = Math.floor(
            (new Date(today) - new Date(stats.lastPracticeDate)) / 864e5,
          );
          if (d > 1) stats.dailyStreak = 0;
        }
        const el = document.getElementById("header-streak"),
          ct = document.getElementById("streak-count");
        if (el && ct) {
          if (stats.dailyStreak > 0) {
            el.classList.remove("hidden");
            el.classList.add("flex");
            ct.textContent = stats.dailyStreak;
          } else el.classList.add("hidden");
        }
      }
      function markPracticeToday() {
        const today = new Date().toDateString();
        if (stats.lastPracticeDate !== today) {
          const d = stats.lastPracticeDate
            ? Math.floor(
                (new Date(today) - new Date(stats.lastPracticeDate)) / 864e5,
              )
            : 999;
          stats.dailyStreak = d <= 1 ? (stats.dailyStreak || 0) + 1 : 1;
          stats.lastPracticeDate = today;
        }
        updateStreak();
        saveState();
      }

      // ═══════════ TYPING ENGINE ═══════════
      function renderText(text) {
        const box = document.getElementById("typing-text");
        if (!box) return;
        const t = text.replace(/\n/g, "↵");
        box.innerHTML = Array.from(t)
          .map((ch, i) => {
            const cur = i === 0 ? "current-char" : "";
            let content = ch,
              extra = "";
            if (ch === " ") content = "&nbsp;";
            else if (ch === "↵") {
              content = "⏎";
              extra = "text-red-400 font-bold text-sm";
            }
            return `<span id="char-${i}" class="char ${cur} ${extra} transition-colors duration-75">${content}</span>`;
          })
          .join("");
      }
      function updateMetrics() {
        const now = Date.now(),
          el = (now - appState.startTime) / 6e4,
          sec = Math.floor((now - appState.startTime) / 1e3);
        appState.wpm =
          el > 0 ? Math.max(0, Math.round(appState.correctChars / 5 / el)) : 0;
        appState.accuracy =
          appState.totalCharsTyped > 0
            ? Math.round(
                (appState.correctChars / appState.totalCharsTyped) * 100,
              )
            : 100;
        const sc = document.getElementById("typing-stats");
        if (!sc) return;
        sc.innerHTML = `
    <div class="text-center"><p class="text-[.6rem] opacity-50">TIME</p><p class="text-lg font-bold text-yellow-400">${sec}s</p></div>
    <div class="text-center"><p class="text-[.6rem] opacity-50">WPM</p><p class="text-lg font-bold text-blue-400">${appState.wpm}</p></div>
    <div class="text-center"><p class="text-[.6rem] opacity-50">ACC</p><p class="text-lg font-bold ${appState.accuracy >= 90 ? "text-green-400" : appState.accuracy >= 70 ? "text-yellow-400" : "text-red-400"}">${appState.accuracy}%</p></div>
    <div class="text-center"><p class="text-[.6rem] opacity-50">ERR</p><p class="text-lg font-bold text-red-400">${appState.errors}</p></div>`;
      }
      function startTyping(text, levelId = null) {
        appState.currentText = text;
        appState.currentIndex = 0;
        appState.errors = 0;
        appState.correctChars = 0;
        appState.totalCharsTyped = 0;
        appState.wpm = 0;
        appState.accuracy = 100;
        appState.startTime = 0;
        appState.currentLevel = levelId;
        appState.isGameMode = false;
        appState.charErrors = {};
        clearInterval(appState.timer);
        appState.timer = null;
        renderText(text);
        updateMetrics();
        document.removeEventListener("keydown", handleKeydown);
        document.addEventListener("keydown", handleKeydown);
        const box = document.getElementById("typing-text");
        if (box) box.focus();
        document.getElementById("finger-hint").textContent = "";
        updateKeyboardHighlight(null);
        const pb = document.getElementById("level-progress");
        if (pb) pb.style.width = "0%";
      }
      function handleKeydown(event) {
        if (
          !document.getElementById("typing-text") ||
          appState.currentIndex >= appState.currentText.length
        )
          return;
        const expected = appState.currentText[appState.currentIndex];
        let typed = event.key;
        if (settings.highlightOn) updateKeyboardHighlight(typed, expected);
        if (typed === "Escape") {
          renderView("levels");
          return;
        }
        if (["Tab", "Alt", "Control", "Meta", "CapsLock"].includes(typed)) {
          event.preventDefault();
          return;
        }
        if (typed === "Backspace") {
          if (appState.currentIndex > 0) handleBackspace();
          event.preventDefault();
          return;
        }
        if (expected === "\n" || expected === "↵")
          typed = typed === "Enter" ? "\n" : typed;
        if (typed.length !== 1 && typed !== "Enter") return;
        event.preventDefault();
        if (!appState.startTime) {
          appState.startTime = Date.now();
          appState.timer = setInterval(updateMetrics, 500);
        }
        if (settings.soundOn && synth)
          try {
            synth.triggerAttackRelease("C5", "16n");
          } catch (e) {}
        // Visual key press
        const ki = KEYBOARD_MAP[typed.toLowerCase()];
        if (ki) {
          const ke = document.getElementById(ki.id);
          if (ke) {
            ke.classList.add("pressed");
            setTimeout(() => ke.classList.remove("pressed"), 120);
          }
        }
        const chars = document.getElementById("typing-text").children,
          curEl = chars[appState.currentIndex];
        let isCorrect = false;
        if (expected === "\n" || expected === "↵")
          isCorrect = typed === "\n" || typed === "Enter";
        else isCorrect = typed === expected;
        curEl.classList.remove("current-char");
        appState.totalCharsTyped++;
        if (isCorrect) {
          curEl.classList.add("correct-char");
          appState.correctChars++;
        } else {
          curEl.classList.add("incorrect-char");
          appState.errors++;
          const ch = expected.toLowerCase();
          appState.charErrors[ch] = (appState.charErrors[ch] || 0) + 1;
          if (settings.soundOn && synth)
            try {
              synth.triggerAttackRelease("E2", "16n");
            } catch (e) {}
        }
        appState.currentIndex++;
        updateMetrics();
        const pct = (appState.currentIndex / appState.currentText.length) * 100;
        const pb = document.getElementById("level-progress");
        if (pb) pb.style.width = pct + "%";
        if (appState.currentIndex >= appState.currentText.length)
          handleCompletion();
        else {
          chars[appState.currentIndex].classList.add("current-char");
          updateKeyboardHighlight(
            null,
            appState.currentText[appState.currentIndex],
          );
        }
      }
      function handleBackspace() {
        const chars = document.getElementById("typing-text").children;
        chars[appState.currentIndex].classList.remove("current-char");
        appState.currentIndex--;
        const prev = chars[appState.currentIndex];
        prev.classList.remove("correct-char", "incorrect-char");
        prev.classList.add("current-char");
        if (appState.totalCharsTyped > 0) appState.totalCharsTyped--;
        updateMetrics();
        updateKeyboardHighlight(
          null,
          appState.currentText[appState.currentIndex],
        );
        const pct = (appState.currentIndex / appState.currentText.length) * 100;
        const pb = document.getElementById("level-progress");
        if (pb) pb.style.width = pct + "%";
      }
      function handleCompletion() {
        document.removeEventListener("keydown", handleKeydown);
        clearInterval(appState.timer);
        markPracticeToday();
        const timeTaken = Math.floor((Date.now() - appState.startTime) / 1e3);
        stats.totalPracticeMinutes =
          (stats.totalPracticeMinutes || 0) + timeTaken / 60;
        let recent = JSON.parse(localStorage.getItem("ta_wpms") || "[]");
        recent.push({
          wpm: appState.wpm,
          acc: appState.accuracy,
          date: Date.now(),
        });
        if (recent.length > 20) recent = recent.slice(-20);
        localStorage.setItem("ta_wpms", JSON.stringify(recent));
        const lid = appState.currentLevel;
        if (lid) {
          const cur = stats.levelProgress[lid] || {
            bestWPM: 0,
            accuracy: 0,
            attempts: 0,
            unlocked: lid === 1,
          };
          cur.attempts++;
          if (appState.wpm > cur.bestWPM) cur.bestWPM = appState.wpm;
          if (appState.accuracy > cur.accuracy)
            cur.accuracy = appState.accuracy;
          stats.levelProgress[lid] = cur;
          const unlockWPM = lid >= 91 ? 40 : lid >= 51 ? 30 : 20;
          if (appState.accuracy >= 75 || appState.wpm >= unlockWPM) {
            const next = LEVELS.find(
              (l) => l.id > lid && !stats.levelProgress[l.id]?.unlocked,
            );
            if (next)
              stats.levelProgress[next.id] = {
                bestWPM: 0,
                accuracy: 0,
                attempts: 0,
                unlocked: true,
              };
          }
        }
        saveState();
        checkBadges();
        if (appState.wpm >= 50 && appState.accuracy >= 95) confetti();
        renderView("results", { ...appState, timeTaken });
      }
      function updateKeyboardHighlight(typed, expected) {
        document
          .querySelectorAll(".key.highlighted-key")
          .forEach((el) => el.classList.remove("highlighted-key"));
        const hint = document.getElementById("finger-hint");
        hint.textContent = "";
        if (!settings.highlightOn || !expected) return;
        const target =
          expected === "\n" || expected === "↵"
            ? "Enter"
            : expected.toLowerCase();
        const info = KEYBOARD_MAP[target];
        if (info) {
          const el = document.getElementById(info.id);
          if (el) {
            el.classList.add("highlighted-key");
            hint.textContent = `Use: ${FINGER_NAMES[info.finger]}`;
          }
        }
        if (
          expected &&
          expected !== expected.toLowerCase() &&
          expected.match(/[A-Z]/)
        ) {
          document
            .getElementById("key-shiftright")
            ?.classList.add("highlighted-key");
        }
      }

      // ═══════════ VIEWS ═══════════
      function renderView(v, d = {}) {
        appState.view = v;
        const c = document.getElementById("content-area");
        c.innerHTML = "";
        if (appState.isGameMode && window.stopGameLoop) window.stopGameLoop();
        appState.isGameMode = false;
        document.removeEventListener("keydown", handleKeydown);
        clearInterval(appState.timer);
        switch (v) {
          case "home":
            showHome(c);
            break;
          case "levels":
            showLevels(c);
            break;
          case "typing":
            showTyping(c, d.text, d.levelId);
            break;
          case "speedTest":
            showSpeedTest(c);
            break;
          case "games":
            showGames(c);
            break;
          case "gamePlay":
            showGamePlay(c, d.game);
            break;
          case "settings":
            showSettings(c);
            break;
          case "hints":
            showHints(c);
            break;
          case "results":
            showResults(c, d);
            break;
          case "analytics":
            showAnalytics(c);
            break;
          case "badges":
            showBadges(c);
            break;
          default:
            showHome(c);
        }
        window.scrollTo(0, 0);
      }
      window.renderView = renderView;

      function showHome(c) {
        const completed = Object.values(stats.levelProgress).filter(
          (l) => l.bestWPM > 0,
        ).length;
        const pct = Math.round((completed / LEVELS.length) * 100);
        const bestWPM = Math.max(
          0,
          ...Object.values(stats.levelProgress).map((l) => l.bestWPM || 0),
        );
        c.innerHTML = `
    <div class="flex-grow flex items-center justify-center"><div class="text-center p-6 md:p-10 w-full max-w-4xl app-card rounded-2xl">
      <h2 class="text-3xl md:text-5xl font-extrabold bg-gradient-to-r from-blue-400 via-purple-400 to-pink-400 bg-clip-text text-transparent mb-3">Welcome Back!</h2>
      <p class="text-sm opacity-60 max-w-lg mx-auto mb-8">Master the keyboard with 100 levels, mini-games, and analytics.</p>
      <div class="grid grid-cols-3 gap-3 max-w-md mx-auto mb-8">
        <div class="p-3 rounded-xl bg-blue-500/10 border border-blue-500/20"><p class="text-2xl font-bold text-blue-400">${completed}<span class="text-sm opacity-50">/${LEVELS.length}</span></p><p class="text-[.6rem] opacity-50 mt-1">LEVELS</p></div>
        <div class="p-3 rounded-xl bg-green-500/10 border border-green-500/20"><p class="text-2xl font-bold text-green-400">${bestWPM}</p><p class="text-[.6rem] opacity-50 mt-1">BEST WPM</p></div>
        <div class="p-3 rounded-xl bg-orange-500/10 border border-orange-500/20"><p class="text-2xl font-bold text-orange-400">${stats.dailyStreak || 0}🔥</p><p class="text-[.6rem] opacity-50 mt-1">STREAK</p></div>
      </div>
      <div class="max-w-md mx-auto mb-8"><div class="flex justify-between text-xs mb-1"><span class="opacity-50">Progress</span><span class="font-bold">${pct}%</span></div><div class="w-full h-2.5 bg-gray-700/50 rounded-full overflow-hidden"><div class="h-full bg-gradient-to-r from-blue-500 to-purple-500 rounded-full transition-all duration-500" style="width:${pct}%"></div></div></div>
      <div class="grid grid-cols-2 md:grid-cols-4 gap-3 max-w-3xl mx-auto">
        ${[
          {
            view: "levels",
            label: "Practice",
            icon: "fa-keyboard",
            g: "from-emerald-600 to-green-700",
          },
          {
            view: "speedTest",
            label: "Speed Test",
            icon: "fa-tachometer-alt",
            g: "from-blue-600 to-cyan-700",
          },
          {
            view: "games",
            label: "Games",
            icon: "fa-gamepad",
            g: "from-purple-600 to-pink-700",
          },
          {
            view: "analytics",
            label: "Progress",
            icon: "fa-chart-line",
            g: "from-teal-600 to-emerald-700",
          },
          {
            view: "badges",
            label: "Badges",
            icon: "fa-trophy",
            g: "from-amber-600 to-yellow-700",
          },
          {
            view: "hints",
            label: "Tips",
            icon: "fa-lightbulb",
            g: "from-yellow-600 to-orange-700",
          },
          {
            view: "settings",
            label: "Settings",
            icon: "fa-cog",
            g: "from-gray-600 to-slate-700",
          },
        ]
          .map(
            (b) =>
              `<button onclick="renderView('${b.view}')" class="p-4 bg-gradient-to-br ${b.g} text-white rounded-xl shadow-lg hover:shadow-xl transition-all hover:scale-[1.03] font-semibold flex flex-col items-center gap-2"><i class="fas ${b.icon} text-xl"></i><span class="text-sm">${b.label}</span></button>`,
          )
          .join("")}
      </div>
    </div></div>`;
      }

      function showLevels(c) {
        let activeCat = CATEGORIES[0].name;
        function render(cat) {
          activeCat = cat;
          const catInfo = CATEGORIES.find((c) => c.name === cat);
          const levels = LEVELS.filter((l) => l.cat === cat);
          const catDone = levels.filter(
            (l) => stats.levelProgress[l.id]?.bestWPM > 0,
          ).length;
          const catPct = Math.round((catDone / levels.length) * 100);
          c.innerHTML = `
      <div class="mb-4"><h2 class="text-2xl font-bold mb-1">Typing Curriculum</h2><p class="text-xs opacity-50">${LEVELS.length} levels • ${CATEGORIES.length} categories</p></div>
      <div class="flex gap-2 overflow-x-auto pb-3 mb-4">${CATEGORIES.map(
        (ct) => {
          const active = ct.name === activeCat;
          const done = LEVELS.filter(
            (l) => l.cat === ct.name && stats.levelProgress[l.id]?.bestWPM > 0,
          ).length;
          const tot = LEVELS.filter((l) => l.cat === ct.name).length;
          return `<button onclick="window._rc('${ct.name}')" class="cat-tab whitespace-nowrap flex items-center gap-2 ${active ? "active bg-blue-500/20 text-blue-400 border-blue-400" : "opacity-60 hover:opacity-100"}"><i class="fas ${ct.icon} text-xs"></i>${ct.name}<span class="text-[.6rem] opacity-50">${done}/${tot}</span></button>`;
        },
      ).join("")}</div>
      <div class="app-card rounded-xl p-4 mb-4 flex items-center justify-between"><div><h3 class="text-lg font-bold flex items-center gap-2"><i class="fas ${catInfo.icon} text-blue-400"></i>${catInfo.name}</h3><p class="text-xs opacity-50 mt-0.5">${catDone}/${levels.length} completed</p></div><div class="relative flex items-center justify-center">${progressRingSVG(catPct, 56, 5)}<span class="absolute text-xs font-bold">${catPct}%</span></div></div>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-3 overflow-y-auto max-h-[60vh] pr-1">${levels
        .map((level) => {
          const ls = stats.levelProgress[level.id];
          const unlocked =
            settings.mode === "free" || level.id === 1 || (ls && ls.unlocked);
          const completed = ls && ls.bestWPM > 0;
          const best = ls ? ls.bestWPM : 0;
          const acc = ls ? ls.accuracy : 0;
          const att = ls ? ls.attempts : 0;
          const star = level.title.startsWith("★");
          return `<button onclick="${unlocked ? `renderView('typing',{text:\`${level.content.replace(/`/g, "\\`").replace(/\\/g, "\\\\").replace(/\n/g, "\\n")}\`,levelId:${level.id}})` : `showModal('🔒 Locked','Complete the previous level with 75%+ accuracy to unlock.')`}" class="level-card ${unlocked ? "unlocked" : "locked"} ${completed ? "completed" : ""} p-3 rounded-xl text-left ${star ? "border-2 border-yellow-500/30" : ""} ${unlocked ? (completed ? "bg-green-500/5 hover:bg-green-500/10" : "bg-blue-500/5 hover:bg-blue-500/10") : "bg-gray-500/5 opacity-60 cursor-not-allowed"}">
          <div class="flex justify-between items-start"><div class="flex-1"><div class="flex items-center gap-2"><span class="text-xs font-bold px-1.5 py-0.5 rounded ${completed ? "bg-green-500/20 text-green-400" : unlocked ? "bg-blue-500/20 text-blue-400" : "bg-gray-500/20 text-gray-500"}">${level.id}</span><span class="text-sm font-bold ${star ? "text-yellow-400" : ""}">${level.title}</span></div><p class="text-[.65rem] opacity-40 mt-1">${level.target}</p></div>
          <div class="text-right">${completed ? `<p class="text-xs font-bold text-green-400">${best} WPM</p><p class="text-[.6rem] opacity-40">${acc}%</p>` : unlocked ? `<span class="text-[.6rem] text-blue-400">PLAY →</span>` : `<i class="fas fa-lock text-xs opacity-30"></i>`}</div></div>
          ${att > 0 ? `<div class="mt-2 h-1 bg-gray-700/50 rounded-full overflow-hidden"><div class="h-full bg-gradient-to-r ${acc >= 90 ? "from-green-500 to-emerald-500" : "from-yellow-500 to-orange-500"} rounded-full" style="width:${Math.min(100, acc)}%"></div></div>` : ""}
        </button>`;
        })
        .join("")}</div>`;
        }
        window._rc = (cat) => render(cat);
        render(activeCat);
      }

      function showTyping(c, text, levelId) {
        const lv = LEVELS.find((l) => l.id === levelId);
        const hasNL = text.includes("\n");
        c.innerHTML = `
    <div class="app-card rounded-xl p-3 mb-3 flex flex-col md:flex-row justify-between items-start md:items-center gap-2">
      <div><h2 class="text-lg font-bold">${levelId ? `Level ${levelId}: ${lv.title}` : "Speed Test"}</h2>${levelId ? `<p class="text-[.6rem] opacity-40">${lv.cat} • ${lv.target}</p>` : ""}</div>
      <div id="typing-stats" class="flex gap-4"></div>
    </div>
    <div class="w-full h-2 rounded-full overflow-hidden mb-3" style="background:rgba(100,116,139,.2)"><div id="level-progress" class="h-full bg-gradient-to-r from-blue-500 to-purple-500 rounded-full transition-all duration-200" style="width:0%"></div></div>
    ${hasNL ? '<p class="text-xs text-yellow-500/70 mb-2"><i class="fas fa-info-circle mr-1"></i>Press ENTER for line breaks (⏎)</p>' : ""}
    <div id="typing-text" tabindex="0" class="typing-box mono focus:outline-none ring-2 ring-transparent focus:ring-blue-500/50" style="font-size:${settings.fontSize}rem"></div>
    <div class="mt-3 flex justify-center gap-3">
      <button onclick="startTyping(\`${text.replace(/`/g, "\\`").replace(/\\/g, "\\\\").replace(/\n/g, "\\n")}\`,${levelId})" class="py-2 px-5 bg-red-500/20 text-red-400 text-sm font-semibold rounded-lg hover:bg-red-500/30 transition border border-red-500/20"><i class="fas fa-redo mr-1"></i>Reset</button>
      <button onclick="renderView('levels')" class="py-2 px-5 bg-gray-500/20 text-gray-400 text-sm font-semibold rounded-lg hover:bg-gray-500/30 transition border border-gray-500/20"><i class="fas fa-arrow-left mr-1"></i>Back</button>
    </div>`;
        startTyping(text, levelId);
      }

      function showSpeedTest(c) {
        const ts = [
          "The five boxing wizards jump quickly at dawn. Pack my box with five dozen liquor jugs. How vexingly quick daft zebras jump!",
          "In the rapidly evolving landscape of technology, developers must continuously adapt to new frameworks, languages, and paradigms.",
          "Success is not the key to happiness. Happiness is the key to success. The journey of a thousand miles begins with a single step.",
        ];
        showTyping(c, ts[Math.floor(Math.random() * ts.length)], null);
      }

      function showResults(c, d) {
        const rating = (w) =>
          w >= 100
            ? "🏆 Legendary"
            : w >= 80
              ? "⭐ Master"
              : w >= 60
                ? "🚀 Expert"
                : w >= 40
                  ? "✅ Intermediate"
                  : w >= 20
                    ? "📚 Beginner"
                    : "🌱 Novice";
        const rc = (w) =>
          w >= 80
            ? "text-yellow-400"
            : w >= 60
              ? "text-blue-400"
              : w >= 40
                ? "text-green-400"
                : "text-gray-400";
        const wk = Object.entries(appState.charErrors || {})
          .sort((a, b) => b[1] - a[1])
          .slice(0, 5);
        c.innerHTML = `
    <div class="flex-grow flex items-center justify-center"><div class="text-center p-6 w-full max-w-xl app-card rounded-2xl">
      <p class="text-sm opacity-50 mb-1">${d.currentLevel ? `Level ${d.currentLevel}` : "Speed Test"} Complete</p>
      <h2 class="text-3xl font-extrabold ${rc(d.wpm)} mb-1">${rating(d.wpm)}</h2>
      <p class="text-xs opacity-40 mb-6">${d.timeTaken}s</p>
      <div class="grid grid-cols-2 gap-3 max-w-sm mx-auto mb-6">
        <div class="p-4 rounded-xl bg-blue-500/10 border border-blue-500/20"><p class="text-4xl font-bold text-blue-400">${d.wpm}</p><p class="text-[.6rem] opacity-50 mt-1">WPM</p></div>
        <div class="p-4 rounded-xl ${d.accuracy >= 90 ? "bg-green-500/10 border-green-500/20" : d.accuracy >= 70 ? "bg-yellow-500/10 border-yellow-500/20" : "bg-red-500/10 border-red-500/20"} border"><p class="text-4xl font-bold ${d.accuracy >= 90 ? "text-green-400" : d.accuracy >= 70 ? "text-yellow-400" : "text-red-400"}">${d.accuracy}%</p><p class="text-[.6rem] opacity-50 mt-1">ACCURACY</p></div>
      </div>
      <div class="flex justify-center gap-4 text-sm mb-6 opacity-60"><span>Errors: <strong class="text-red-400">${d.errors}</strong></span><span>Correct: <strong class="text-green-400">${d.correctChars}</strong></span></div>
      ${wk.length ? `<div class="mb-6 p-3 rounded-xl bg-red-500/5 border border-red-500/15 text-left"><p class="text-xs font-semibold text-red-400 mb-2"><i class="fas fa-exclamation-triangle mr-1"></i>Practice These Keys</p><div class="flex gap-2 flex-wrap">${wk.map(([k, v]) => `<span class="px-2 py-1 rounded bg-red-500/15 text-red-400 text-xs mono font-bold">'${k === " " ? "space" : k}' ×${v}</span>`).join("")}</div></div>` : ""}
      <div class="flex justify-center gap-3">
        ${d.currentLevel ? `<button onclick="renderView('typing',{text:\`${d.currentText.replace(/`/g, "\\`").replace(/\\/g, "\\\\").replace(/\n/g, "\\n")}\`,levelId:${d.currentLevel}})" class="py-2.5 px-5 bg-gradient-to-r from-blue-600 to-purple-600 text-white text-sm font-semibold rounded-xl shadow-lg"><i class="fas fa-redo mr-1"></i>Retry</button>` : ""} 
        <button onclick="renderView('speedTest')" class="py-2.5 px-5 bg-blue-500/15 text-blue-400 text-sm font-semibold rounded-xl border border-blue-500/20"><i class="fas fa-bolt mr-1"></i>Speed Test</button>
        <button onclick="renderView('levels')" class="py-2.5 px-5 bg-gray-500/15 text-gray-400 text-sm font-semibold rounded-xl border border-gray-500/20"><i class="fas fa-list mr-1"></i>Levels</button>
      </div>
    </div></div>`;
      }

      function showGames(c) {
        c.innerHTML = `
    <h2 class="text-2xl font-bold mb-2">Typing Games</h2><p class="text-xs opacity-50 mb-6">Fun ways to improve speed</p>
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">${[
      {
        id: "fallingWords",
        title: "Falling Words",
        desc: "Type words before they fall!",
        icon: "fa-cloud-arrow-down",
        color: "from-purple-600 to-pink-600",
      },
      {
        id: "typingRace",
        title: "Typing Race",
        desc: "Race against the clock!",
        icon: "fa-flag-checkered",
        color: "from-green-600 to-teal-600",
      },
      {
        id: "wordBlast",
        title: "Word Blast",
        desc: "Destroy words by typing them!",
        icon: "fa-explosion",
        color: "from-orange-600 to-red-600",
      },
    ]
      .map(
        (g) =>
          `<button onclick="renderView('gamePlay',{game:'${g.id}'})" class="p-6 rounded-2xl bg-gradient-to-br ${g.color} text-white text-left shadow-lg hover:shadow-xl transition-all hover:scale-[1.02]"><i class="fas ${g.icon} text-3xl mb-3 opacity-80"></i><h3 class="text-lg font-bold mb-1">${g.title}</h3><p class="text-xs opacity-70">${g.desc}</p></button>`,
      )
      .join("")}</div>`;
      }

      function showGamePlay(c, gid) {
        c.innerHTML = `<div class="flex justify-between items-center mb-3"><h2 class="text-xl font-bold">${gid.replace(/([A-Z])/g, " $1").trim()}</h2><button onclick="renderView('games')" class="text-sm text-red-400 hover:text-red-300"><i class="fas fa-times mr-1"></i>Exit</button></div><div id="game-area" class="game-canvas w-full h-80 md:h-96 flex items-center justify-center"></div><div id="game-controls" class="mt-3 flex justify-center"></div>`;
        if (gid === "fallingWords") initFallingWords();
        else if (gid === "typingRace") initTypingRace();
        else if (gid === "wordBlast") initWordBlast();
      }

      function initFallingWords() {
        const area = document.getElementById("game-area");
        const words = [
          "the",
          "quick",
          "brown",
          "fox",
          "jumps",
          "over",
          "lazy",
          "dog",
          "code",
          "type",
          "fast",
          "speed",
          "skill",
          "learn",
          "focus",
          "data",
          "loop",
          "array",
          "build",
          "class",
        ];
        let score = 0,
          lives = 5,
          active = [],
          gLoop = null,
          inputText = "",
          spawnTimer = 0;
        appState.isGameMode = true;
        function spawn() {
          active.push({
            word: words[Math.floor(Math.random() * words.length)],
            x: Math.random() * 80 + 5,
            y: -5,
            speed: 0.2 + Math.random() * 0.3,
          });
        }
        function render() {
          area.innerHTML = `<div class="absolute top-3 left-4 text-sm">Score: <strong class="text-green-400">${score}</strong></div><div class="absolute top-3 right-4 text-sm">Lives: <strong class="text-red-400">${"❤️".repeat(lives)}</strong></div><div class="absolute bottom-4 left-1/2 transform -translate-x-1/2 text-lg mono font-bold text-blue-400 bg-blue-500/10 px-4 py-1 rounded-lg border border-blue-500/20">${inputText || "type here..."}</div>${active.map((w) => `<div class="absolute text-sm font-bold mono px-2 py-1 rounded bg-purple-500/30 text-purple-300 border border-purple-500/20" style="left:${w.x}%;top:${w.y}%">${w.word}</div>`).join("")}`;
        }
        function update() {
          spawnTimer++;
          if (spawnTimer % 90 === 0) spawn();
          active.forEach((w) => (w.y += w.speed));
          active = active.filter((w) => {
            if (w.y > 95) {
              lives--;
              return false;
            }
            return true;
          });
          if (lives <= 0) {
            cancelAnimationFrame(gLoop);
            area.innerHTML = `<div class="text-center"><p class="text-3xl font-bold text-red-400 mb-2">Game Over!</p><p>Score: ${score}</p></div>`;
            document.getElementById("game-controls").innerHTML =
              `<button onclick="renderView('gamePlay',{game:'fallingWords'})" class="py-2 px-5 bg-green-600 text-white rounded-lg text-sm font-semibold">Again</button>`;
            document.removeEventListener("keydown", gi);
            return;
          }
          render();
          gLoop = requestAnimationFrame(update);
        }
        function gi(e) {
          if (e.key === "Backspace") {
            inputText = inputText.slice(0, -1);
            e.preventDefault();
            return;
          }
          if (e.key.length !== 1) return;
          e.preventDefault();
          inputText += e.key.toLowerCase();
          const idx = active.findIndex((w) => w.word === inputText);
          if (idx !== -1) {
            active.splice(idx, 1);
            score += inputText.length * 10;
            inputText = "";
          }
        }
        document.addEventListener("keydown", gi);
        window.stopGameLoop = () => {
          cancelAnimationFrame(gLoop);
          document.removeEventListener("keydown", gi);
          appState.isGameMode = false;
        };
        spawn();
        gLoop = requestAnimationFrame(update);
      }

      function initTypingRace() {
        const area = document.getElementById("game-area");
        const sent =
          "the quick brown fox jumps over the lazy dog and runs through the forest";
        let idx = 0,
          st = 0,
          done = false;
        appState.isGameMode = true;
        function render() {
          const el = st ? ((Date.now() - st) / 1e3).toFixed(1) : 0;
          const p = (idx / sent.length) * 100;
          area.innerHTML = `<div class="p-6 w-full"><div class="mb-4 flex justify-between text-sm"><span class="opacity-50">Time: ${el}s</span><span class="opacity-50">${Math.round(p)}%</span></div><div class="w-full h-3 rounded-full overflow-hidden mb-6" style="background:rgba(100,116,139,.2)"><div class="h-full bg-gradient-to-r from-green-500 to-emerald-400 rounded-full transition-all" style="width:${p}%"></div></div><div class="relative h-8 bg-gray-800/50 rounded-full mb-6 overflow-hidden"><div class="absolute top-0 h-full flex items-center transition-all" style="left:${p}%"><span class="text-xl">🏎️</span></div></div><p class="text-lg mono leading-relaxed">${Array.from(
            sent,
          )
            .map((ch, i) =>
              i < idx
                ? `<span class="text-green-400">${ch}</span>`
                : i === idx
                  ? `<span class="bg-blue-500/30 px-0.5 border-b-2 border-blue-400">${ch}</span>`
                  : `<span class="opacity-30">${ch}</span>`,
            )
            .join("")}</p></div>`;
        }
        function gi(e) {
          if (done) return;
          if (e.key.length !== 1 && e.key !== " ") return;
          e.preventDefault();
          if (!st) st = Date.now();
          if (e.key === sent[idx]) idx++;
          if (idx >= sent.length) {
            done = true;
            const t = ((Date.now() - st) / 1e3).toFixed(1);
            const wpm = Math.round(sent.split(" ").length / (t / 60));
            area.innerHTML = `<div class="text-center p-6"><p class="text-3xl font-bold text-green-400 mb-2">🏁 Finished!</p><p class="text-xl mb-1">${t}s</p><p class="text-xl text-blue-400">${wpm} WPM</p></div>`;
            document.getElementById("game-controls").innerHTML =
              `<button onclick="renderView('gamePlay',{game:'typingRace'})" class="py-2 px-5 bg-green-600 text-white rounded-lg text-sm font-semibold">Again</button>`;
            document.removeEventListener("keydown", gi);
          }
          render();
        }
        document.addEventListener("keydown", gi);
        window.stopGameLoop = () => {
          document.removeEventListener("keydown", gi);
          appState.isGameMode = false;
        };
        render();
      }

      function initWordBlast() {
        const area = document.getElementById("game-area");
        const pool = [
          "alpha",
          "bravo",
          "charlie",
          "delta",
          "echo",
          "foxtrot",
          "golf",
          "hotel",
          "india",
          "juliet",
          "kilo",
          "lima",
          "mike",
          "november",
        ];
        let score = 0,
          lv = 1,
          cur = "",
          inp = "",
          timeLeft = 30,
          gt = null;
        appState.isGameMode = true;
        function next() {
          cur = pool[Math.floor(Math.random() * pool.length)];
          inp = "";
        }
        function render() {
          area.innerHTML = `<div class="text-center p-6 w-full"><div class="flex justify-between text-sm mb-4"><span>Score: <strong class="text-green-400">${score}</strong></span><span>Level: <strong class="text-purple-400">${lv}</strong></span><span>Time: <strong class="text-yellow-400">${timeLeft}s</strong></span></div><p class="text-4xl font-bold mono mb-6">${Array.from(
            cur,
          )
            .map((ch, i) =>
              i < inp.length
                ? `<span class="text-green-400">${ch}</span>`
                : `<span class="opacity-40">${ch}</span>`,
            )
            .join(
              "",
            )}</p><p class="text-lg mono text-blue-400">${inp || "..."}</p></div>`;
        }
        function gi(e) {
          if (e.key === "Backspace") {
            inp = inp.slice(0, -1);
            render();
            e.preventDefault();
            return;
          }
          if (e.key.length !== 1) return;
          e.preventDefault();
          inp += e.key.toLowerCase();
          if (inp === cur) {
            score += cur.length * 10 + lv * 5;
            lv = 1 + ((score / 100) | 0);
            next();
          } else if (!cur.startsWith(inp)) inp = "";
          render();
        }
        next();
        gt = setInterval(() => {
          timeLeft--;
          if (timeLeft <= 0) {
            clearInterval(gt);
            area.innerHTML = `<div class="text-center p-6"><p class="text-3xl font-bold text-orange-400 mb-2">💥 Time's Up!</p><p class="text-xl">Score: ${score}</p></div>`;
            document.getElementById("game-controls").innerHTML =
              `<button onclick="renderView('gamePlay',{game:'wordBlast'})" class="py-2 px-5 bg-orange-600 text-white rounded-lg text-sm font-semibold">Again</button>`;
            document.removeEventListener("keydown", gi);
          }
          render();
        }, 1e3);
        document.addEventListener("keydown", gi);
        window.stopGameLoop = () => {
          clearInterval(gt);
          document.removeEventListener("keydown", gi);
          appState.isGameMode = false;
        };
        render();
      }

      function showAnalytics(c) {
        const completed = Object.values(stats.levelProgress).filter(
          (l) => l.bestWPM > 0,
        ).length;
        const allW = Object.values(stats.levelProgress)
          .filter((l) => l.bestWPM > 0)
          .map((l) => l.bestWPM);
        const avgWPM = allW.length
          ? Math.round(allW.reduce((a, b) => a + b, 0) / allW.length)
          : 0;
        const bestWPM = Math.max(0, ...allW);
        const avgAcc = Object.values(stats.levelProgress).filter(
          (l) => l.accuracy > 0,
        );
        const avgAccuracy = avgAcc.length
          ? Math.round(
              avgAcc.reduce((a, b) => a + b.accuracy, 0) / avgAcc.length,
            )
          : 0;
        const recent = JSON.parse(localStorage.getItem("ta_wpms") || "[]");
        const maxW = Math.max(60, ...recent.map((r) => r.wpm || r));
        c.innerHTML = `
    <h2 class="text-2xl font-bold mb-6">Progress & Analytics</h2>
    <div class="grid grid-cols-2 md:grid-cols-5 gap-3 mb-6">${[
      {
        l: "Levels",
        v: `${completed}/${LEVELS.length}`,
        cl: "green",
        i: "fa-layer-group",
      },
      { l: "Avg WPM", v: avgWPM, cl: "blue", i: "fa-gauge-high" },
      { l: "Best WPM", v: bestWPM, cl: "purple", i: "fa-crown" },
      { l: "Avg Acc", v: avgAccuracy + "%", cl: "emerald", i: "fa-bullseye" },
      {
        l: "Practice",
        v: Math.round(stats.totalPracticeMinutes || 0) + "m",
        cl: "amber",
        i: "fa-clock",
      },
    ]
      .map(
        (s) =>
          `<div class="app-card rounded-xl p-4 text-center"><i class="fas ${s.i} text-${s.cl}-400 text-lg mb-2"></i><p class="text-2xl font-bold text-${s.cl}-400">${s.v}</p><p class="text-[.6rem] opacity-40 mt-1">${s.l}</p></div>`,
      )
      .join("")}</div>
    <div class="app-card rounded-xl p-4 mb-6"><h3 class="text-sm font-bold mb-4 opacity-70">WPM History (Last ${recent.length})</h3>${
      recent.length
        ? `<div id="wpm-history-chart">${recent
            .map((r) => {
              const w = typeof r === "object" ? r.wpm : r;
              return `<div class="wpm-bar group" style="height:${Math.max(5, (w / maxW) * 100)}%" title="${w} WPM"><span class="wpm-label opacity-0 group-hover:opacity-100 transition-opacity">${w}</span></div>`;
            })
            .join(
              "",
            )}</div><div class="text-[.6rem] opacity-30 flex justify-between mt-1"><span>Oldest</span><span>Newest</span></div>`
        : `<p class="text-sm opacity-30 text-center py-8">Start practicing!</p>`
    }</div>
    <div class="app-card rounded-xl p-4"><h3 class="text-sm font-bold mb-4 opacity-70">Categories</h3><div class="space-y-3">${CATEGORIES.map(
      (cat) => {
        const cl = LEVELS.filter((l) => l.cat === cat.name);
        const dn = cl.filter(
          (l) => stats.levelProgress[l.id]?.bestWPM > 0,
        ).length;
        const pct = Math.round((dn / cl.length) * 100);
        const cb = Math.max(
          0,
          ...cl.map((l) => stats.levelProgress[l.id]?.bestWPM || 0),
        );
        return `<div class="flex items-center gap-3"><i class="fas ${cat.icon} text-xs w-5 text-center opacity-50"></i><span class="text-sm w-24 truncate">${cat.name}</span><div class="flex-1 h-2 rounded-full overflow-hidden" style="background:rgba(100,116,139,.15)"><div class="h-full bg-gradient-to-r from-blue-500 to-purple-500 rounded-full" style="width:${pct}%"></div></div><span class="text-xs opacity-50 w-12 text-right">${dn}/${cl.length}</span><span class="text-xs text-blue-400 w-16 text-right">${cb > 0 ? cb + " WPM" : "-"}</span></div>`;
      },
    ).join("")}</div></div>`;
      }

      function showBadges(c) {
        c.innerHTML = `<h2 class="text-2xl font-bold mb-2">Achievements</h2><p class="text-xs opacity-50 mb-6">${stats.badges.length}/${BADGES_DEF.length} earned</p><div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3">${BADGES_DEF.map(
          (b) => {
            const e = stats.badges.includes(b.id);
            return `<div class="app-card rounded-xl p-4 text-center ${e ? "" : "opacity-40"}"><p class="text-3xl mb-2">${e ? b.icon : "🔒"}</p><p class="text-sm font-bold mb-1">${b.name}</p><p class="text-[.6rem] opacity-50">${b.desc}</p>${e ? `<span class="badge badge-gold mt-2 text-[.6rem]">EARNED</span>` : `<span class="badge badge-locked mt-2 text-[.6rem]">LOCKED</span>`}</div>`;
          },
        ).join("")}</div>`;
      }

      function showSettings(c) {
        c.innerHTML = `<div class="max-w-2xl mx-auto w-full"><h2 class="text-2xl font-bold mb-6">Settings</h2><div class="app-card rounded-xl p-5 space-y-4">
    <div class="flex justify-between items-center pb-3 border-b border-gray-600/30"><span class="text-sm"><i class="fas fa-palette mr-2 opacity-50"></i>Theme</span><select id="ts" class="p-1.5 rounded-lg bg-gray-700/50 text-sm border border-gray-600/30" onchange="updateSetting('theme',this.value)"><option value="dark">🌙 Dark</option><option value="light">☀️ Light</option><option value="neon">💚 Neon</option><option value="sunset">🌅 Sunset</option><option value="ocean">🌊 Ocean</option></select></div>
    <div class="flex justify-between items-center pb-3 border-b border-gray-600/30"><span class="text-sm"><i class="fas fa-unlock mr-2 opacity-50"></i>Mode</span><select id="ms" class="p-1.5 rounded-lg bg-gray-700/50 text-sm border border-gray-600/30" onchange="updateSetting('mode',this.value)"><option value="structured">🔒 Structured</option><option value="free">🔓 Free</option></select></div>
    <div class="flex justify-between items-center pb-3 border-b border-gray-600/30"><div><span class="text-sm"><i class="fas fa-text-height mr-2 opacity-50"></i>Font Size</span><span id="fv" class="text-xs opacity-50 ml-2">${settings.fontSize}rem</span></div><input type="range" id="fr" min="1.0" max="2.2" step="0.1" value="${settings.fontSize}" class="w-32" oninput="updateSetting('fontSize',parseFloat(this.value));document.getElementById('fv').textContent=this.value+'rem'"></div>
    ${[
      { id: "soundOn", label: "Key Sounds", icon: "fa-volume-up" },
      {
        id: "highlightOn",
        label: "Keyboard Highlight",
        icon: "fa-hand-pointer",
      },
      { id: "hintsOn", label: "Show Tips", icon: "fa-lightbulb" },
    ]
      .map(
        (item) =>
          `<div class="flex justify-between items-center pb-3 border-b border-gray-600/30"><span class="text-sm"><i class="fas ${item.icon} mr-2 opacity-50"></i>${item.label}</span><label class="relative inline-flex items-center cursor-pointer"><input type="checkbox" id="${item.id}-t" class="sr-only peer" ${settings[item.id] ? "checked" : ""} onchange="updateSetting('${item.id}',this.checked)"><div class="w-10 h-5 bg-gray-600 rounded-full peer peer-checked:bg-blue-600 after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:after:translate-x-5"></div></label></div>`,
      )
      .join("")}
    <div class="flex justify-between items-center pt-2"><button onclick="exportProgress()" class="py-2 px-4 bg-teal-500/15 text-teal-400 text-sm rounded-lg border border-teal-500/20"><i class="fas fa-download mr-1"></i>Export</button><button onclick="if(confirm('Reset all?')){localStorage.clear();location.reload()}" class="py-2 px-4 bg-red-500/15 text-red-400 text-sm rounded-lg border border-red-500/20"><i class="fas fa-trash mr-1"></i>Reset</button></div>
  </div></div>`;
        document.getElementById("ts").value = settings.theme;
        document.getElementById("ms").value = settings.mode;
      }

      function showHints(c) {
        c.innerHTML = `<h2 class="text-2xl font-bold mb-6">Pro Typing Tips</h2><div class="grid grid-cols-1 md:grid-cols-2 gap-3 max-w-3xl mx-auto">${HINTS.map((h, i) => `<div class="app-card rounded-xl p-4 flex items-start gap-3"><div class="w-8 h-8 rounded-full bg-gradient-to-br from-teal-500 to-emerald-600 flex items-center justify-center text-white font-bold text-sm flex-shrink-0">${i + 1}</div><p class="text-sm opacity-80">${h}</p></div>`).join("")}</div>`;
      }

      function updateSetting(k, v) {
        settings[k] = v;
        applySettings();
        saveState();
      }
      window.updateSetting = updateSetting;

      function exportProgress() {
        const d = JSON.stringify(
          {
            settings,
            stats,
            wpms: JSON.parse(localStorage.getItem("ta_wpms") || "[]"),
          },
          null,
          2,
        );
        const b = new Blob([d], { type: "application/json" }),
          u = URL.createObjectURL(b),
          a = document.createElement("a");
        a.href = u;
        a.download = "SKSingh_Typing.json";
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        showModal("✅ Exported", "Downloaded as JSON.");
      }

      // ═══════════ INIT ═══════════
      window.onload = function () {
        loadState();
        setupSynth();
        if (!stats.levelProgress[1])
          stats.levelProgress[1] = {
            bestWPM: 0,
            accuracy: 0,
            attempts: 0,
            unlocked: true,
          };
        renderView("home");
      };
    </script>
  </body>
</html>
